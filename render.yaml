services:
  - type: web
    name: personal-finance-manager
    env: java
    buildCommand: ./gradlew clean bootJar
    startCommand: java -jar build/libs/personal-finance-manager-0.0.1-SNAPSHOT.jar
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
